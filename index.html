<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allure Studios Management Agency | Arriving Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --cream: #f9f7f2;
            --dark: #2c2c2c;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            padding: 40px 20px;
            z-index: 2;
        }

        .logo {
            max-width: 220px;
            height: auto;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in;
        }

        h1 {
            font-family: 'Cinzel', serif;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 2.2rem;
            margin: 0;
            color: var(--gold);
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        /* Countdown Container */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .number {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: var(--gold);
            font-weight: 700;
            line-height: 1;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            opacity: 0.6;
        }

        .status-message {
            font-size: 1.1rem;
            margin: 40px 0;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* Footer Links */
        .links {
            margin-top: 50px;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
            padding-top: 30px;
        }

        .links a {
            color: var(--dark);
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .links a:hover {
            color: var(--gold);
            letter-spacing: 3px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            #countdown { gap: 15px; }
            .number { font-size: 1.8rem; }
            .time-segment { min-width: 60px; }
            .links a { display: block; margin: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="PHOTO-2026-03-23-20-47-06.jpg" alt="Allure Studios Logo" class="logo">
        
        <h1>Allure Studios</h1>
        <div class="subtitle">Management Agency</div>
        
        <div id="countdown">
            <div class="time-segment">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-segment">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-segment">
                <span class="number" id="minutes">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-segment">
                <span class="number" id="seconds">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
        
        <p class="status-message">Refining excellence. Arriving in Summer 2026.</p>
        
        <div class="links">
            <a href="https://x.com/Allurestudios_" target="_blank">Follow on X</a>
            <a href="mailto:info@allurestudiosagency.com">Contact Agency</a>
        </div>
    </div>

    <script>
        // Set the hard-coded launch date: June 26, 2026
        const launchDate = new Date("June 26, 2026 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const difference = launchDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            if (difference < 0) {
                clearInterval(countdownInterval);
                document.getElementById("countdown").innerHTML = "<h1>WE ARE LIVE</h1>";
            }
        }

        const countdownInterval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>
